name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Composer security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies (pull request)
        if: github.event_name == 'pull_request'
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Install dependencies (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: composer audit
        run: composer audit --locked --abandoned=report

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }}, Level max + PHPat)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.5']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_sqlite
          coverage: none

      - name: Install dependencies (pull request)
        if: github.event_name == 'pull_request'
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Install dependencies (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  php-cs-fixer:
    name: PHP-CS-Fixer (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.5']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies (pull request)
        if: github.event_name == 'pull_request'
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Install dependencies (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: Run PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --diff --dry-run

  php-cs-fixer-commit:
    name: PHP-CS-Fixer auto-commit (trusted push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: Run PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --diff

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "style: auto-fix coding standards via PHP-CS-Fixer"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  phpunit-latest:
    name: PHPUnit Latest (PHP 8.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_sqlite
          coverage: none

      - name: Install latest allowed PHPUnit (pull request)
        if: github.event_name == 'pull_request'
        run: composer update phpunit/phpunit --with-all-dependencies --no-progress --prefer-dist --no-scripts

      - name: Install latest allowed PHPUnit (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer update phpunit/phpunit --with-all-dependencies --no-progress --prefer-dist

      - name: Assert PHPUnit 13 is selected
        run: vendor/bin/phpunit --version | grep -E '^PHPUnit 13\.'

      - name: Run Unit Tests
        run: Build/Scripts/runTests.sh -s unit -p 8.5

      - name: Run Functional Tests
        env:
          typo3DatabaseDriver: pdo_sqlite
        run: Build/Scripts/runTests.sh -s functional -p 8.5

  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            coverage: none
          - php: '8.4'
            coverage: none
          - php: '8.5'
            coverage: xdebug
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_sqlite
          coverage: ${{ matrix.coverage }}

      - name: Install dependencies (pull request)
        if: github.event_name == 'pull_request'
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Install dependencies (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: Run Unit Tests
        run: |
          mkdir -p var/log
          if [ "${{ matrix.coverage }}" = "xdebug" ]; then
            Build/Scripts/runTests.sh -s unit-coverage -p ${{ matrix.php }}
          else
            Build/Scripts/runTests.sh -s unit -p ${{ matrix.php }}
          fi

      - name: Upload unit coverage
        if: matrix.coverage == 'xdebug' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-coverage-php-${{ matrix.php }}
          path: |
            var/log/unit-coverage.xml
            var/log/coverage/unit-html
          if-no-files-found: ignore

  functional-tests:
    name: Functional Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            coverage: none
          - php: '8.4'
            coverage: none
          - php: '8.5'
            coverage: xdebug
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: typo3_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      typo3DatabaseHost: 127.0.0.1
      typo3DatabasePort: 3306
      typo3DatabaseUsername: root
      typo3DatabasePassword: root
      typo3DatabaseName: typo3_test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, pdo_mysql, mysqli
          coverage: ${{ matrix.coverage }}

      - name: Install dependencies (pull request)
        if: github.event_name == 'pull_request'
        run: composer install --no-progress --prefer-dist --no-scripts

      - name: Install dependencies (trusted)
        if: github.event_name != 'pull_request'
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ github.token }}"}}'
        run: composer install --no-progress --prefer-dist

      - name: Run Functional Tests
        run: |
          mkdir -p var/log
          if [ "${{ matrix.coverage }}" = "xdebug" ]; then
            Build/Scripts/runTests.sh -s functional-coverage -p ${{ matrix.php }}
          else
            Build/Scripts/runTests.sh -s functional -p ${{ matrix.php }}
          fi

      - name: Upload functional coverage
        if: matrix.coverage == 'xdebug' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: functional-coverage-php-${{ matrix.php }}
          path: |
            var/log/functional-coverage.xml
            var/log/coverage/functional-html
          if-no-files-found: ignore
