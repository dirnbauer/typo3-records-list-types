version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - composer
    groups:
      dev-tooling:
        patterns:
          - "phpstan/*"
          - "phpunit/*"
          - "friendsofphp/php-cs-fixer"
          - "saschaegerer/phpstan-typo3"
          - "ssch/typo3-rector"
          - "phpat/*"
          - "typo3/testing-framework"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
