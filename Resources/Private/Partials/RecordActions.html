<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:comment>
    Record Actions for custom Grid View cards
    
    This legacy partial renders action buttons when a custom template
    explicitly passes record.actions. It uses the same data-gridview-action
    hooks as the maintained built-in templates.
</f:comment>

<div class="btn-group btn-group-sm" role="group">
    <f:if condition="{record.permissions.canEdit}">
        <typo3-backend-contextual-record-edit-trigger
            class="btn btn-default"
            title="{f:translate(key: 'action.edit', extensionName: 'RecordsListTypes')}"
            edit-url="{record.editUrl}"
            url="{record.contextualEditUrl}">
            <core:icon identifier="actions-open" size="small" />
        </typo3-backend-contextual-record-edit-trigger>
    </f:if>

    <f:if condition="{record.permissions.canShowInfo}">
        <a href="#"
           class="btn btn-default"
           data-gridview-action="info"
           data-table="{record.tableName}"
           data-uid="{record.uid}"
           title="{f:translate(key: 'action.info', extensionName: 'RecordsListTypes')}">
            <core:icon identifier="actions-document-info" size="small" />
        </a>
    </f:if>

    <f:if condition="{record.permissions.canToggleVisibility}">
        <f:if condition="{record.hidden}">
            <f:then>
                <button type="button"
                        class="btn btn-default"
                        data-gridview-action="show"
                        data-table="{record.tableName}"
                        data-uid="{record.uid}"
                        title="{f:translate(key: 'action.unhide', extensionName: 'RecordsListTypes')}">
                    <core:icon identifier="actions-edit-unhide" size="small" />
                </button>
            </f:then>
            <f:else>
                <button type="button"
                        class="btn btn-default"
                        data-gridview-action="hide"
                        data-table="{record.tableName}"
                        data-uid="{record.uid}"
                        title="{f:translate(key: 'action.hide', extensionName: 'RecordsListTypes')}">
                    <core:icon identifier="actions-edit-hide" size="small" />
                </button>
            </f:else>
        </f:if>
    </f:if>
</div>

<f:comment>Additional actions from event listeners (rendered as raw HTML)</f:comment>
<f:if condition="{record.actions}">
    <div class="btn-group btn-group-sm ms-1" role="group">
        <f:for each="{record.actions}" as="actionHtml">
            <f:sanitize.html build="records-list-types-backend-fragments">{actionHtml}</f:sanitize.html>
        </f:for>
    </div>
</f:if>

</html>
