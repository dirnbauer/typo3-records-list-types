services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Webconsulting\RecordsListTypes\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'

  # Public extension points: resolvable via the container for custom view
  # types and third-party integrations.
  Webconsulting\RecordsListTypes\Service\ViewModeResolver:
    public: true

  Webconsulting\RecordsListTypes\Service\GridConfigurationService:
    public: true

  Webconsulting\RecordsListTypes\Service\ViewTypeRegistry:
    public: true

  Webconsulting\RecordsListTypes\Service\RecordViewEnrichmentService:
    public: true

  # Controllers: XCLASSes are resolved through GeneralUtility::makeInstance(),
  # which delegates to the container only for public services.
  Webconsulting\RecordsListTypes\Controller\RecordListController:
    public: true
    tags: ['backend.controller']

  Webconsulting\RecordsListTypes\Controller\ContentElement\ElementHistoryController:
    public: true
    tags: ['backend.controller']

  Webconsulting\RecordsListTypes\Controller\Ajax\ViewModeController:
    public: true
    tags: ['backend.controller']
